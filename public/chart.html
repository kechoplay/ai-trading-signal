<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trading Signal — Biểu đồ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e8eaed;
      --text: #1a1d23;
      --muted: #6b7280;
      --buy-accent: #22c55e;
      --sell-accent: #ef4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .page-title span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      text-decoration: none;
      transition: background .15s;
    }
    .nav-btn:hover { background: #f3f4f6; }

    .analyze-btn {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: #fff;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .analyze-btn:hover { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
    .analyze-btn:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: -1px;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a1d23; color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      z-index: 1000;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #b91c1c; }
    .toast.success { background: #15803d; }

    /* ── Layout: chart left, symbols right ── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    }

    .chart-card, .symbols-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chart-card { padding: 0; }
    #tv_chart { flex: 1; min-height: 0; }
    @media (max-width: 820px) { #tv_chart { min-height: 420px; } }

    .symbols-card { min-height: 0; }
    .symbols-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .symbols-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .symbols-search input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      color: var(--text);
    }
    .symbols-search input:focus { border-color: #6366f1; }

    .symbols-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .symbol-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }
    .symbol-item:hover { background: #f9fafb; }
    .symbol-item.active { background: #eef2ff; box-shadow: inset 3px 0 0 #6366f1; }
    .symbol-meta { min-width: 0; }
    .symbol-code { font-size: 14px; font-weight: 700; }
    .symbol-name { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .symbol-star { font-size: 13px; flex-shrink: 0; }
    .symbol-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .symbol-tag.crypto { background: #fef3c7; color: #b45309; }
    .symbol-tag.fx { background: #dbeafe; color: #1d4ed8; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

    /* ── Add coin ── */
    .add-btn {
      background: #eef2ff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #4f46e5;
      cursor: pointer;
    }
    .add-btn:hover { background: #e0e7ff; }

    .add-panel { border-bottom: 1px solid var(--border); background: #fafbff; display: none; }
    .add-panel.open { display: block; }
    .add-panel .add-input-row { padding: 10px 12px; }
    .add-panel input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      color: var(--text);
    }
    .add-panel input:focus { border-color: #6366f1; }
    .add-results { list-style: none; max-height: 240px; overflow-y: auto; }
    .add-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .add-result-item .ar-meta { min-width: 0; }
    .add-result-item .ar-code { font-weight: 700; }
    .add-result-item .ar-name { font-size: 11px; color: var(--muted); }
    .add-result-item .ar-add {
      background: var(--buy-accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .add-result-item .ar-add:disabled { background: #cbd5e1; cursor: default; }
    .add-hint { padding: 8px 14px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-title">
    📈 Biểu đồ
    <span id="currentSymbol"></span>
  </div>
  <div class="header-actions">
    <button id="analyzeBtn" class="nav-btn analyze-btn" onclick="runAnalyze()">⚡ Phân tích</button>
    <a href="/" class="nav-btn">🏠 Tín hiệu</a>
    <a href="/longterm" class="nav-btn">📊 Dài hạn</a>
    <a href="/docs" target="_blank" class="nav-btn">📖 Docs</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="layout">
  <div class="chart-card">
    <div id="tv_chart"></div>
  </div>

  <div class="symbols-card">
    <div class="symbols-header">
      <span>Danh sách Symbol <span id="symbolCount" style="font-weight:400"></span></span>
      <button class="add-btn" id="addToggle" onclick="toggleAddPanel()">+ Thêm coin</button>
    </div>

    <div class="add-panel" id="addPanel">
      <div class="add-input-row">
        <input id="tvSearchInput" type="text" placeholder="Gõ tên coin từ TradingView (vd: sol, link, doge)…" autocomplete="off" oninput="onTvSearchInput()" />
      </div>
      <ul class="add-results" id="addResults"></ul>
    </div>

    <div class="symbols-search">
      <input id="searchInput" type="text" placeholder="Lọc danh sách hiện có..." oninput="renderList()" />
    </div>
    <ul class="symbols-list" id="symbolsList">
      <li class="empty">Đang tải…</li>
    </ul>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const CRYPTO_BASES = ['BTC','ETH','BNB','SOL','XRP','ADA','DOGE','LTC','AVAX','DOT','MATIC','LINK','TRX'];

let symbols = [];
let activeSymbol = null;
let tvWidget = null;

function isCrypto(symbol) {
  const base = String(symbol).split('/')[0].toUpperCase();
  return CRYPTO_BASES.includes(base);
}

// Map "XAU/USD" / "BTC/USD" → TradingView symbol
function tvSymbol(symbol) {
  const [rawBase, rawQuote] = String(symbol).toUpperCase().split('/');
  const base = rawBase || symbol.toUpperCase();
  const quote = rawQuote || 'USD';
  if (isCrypto(symbol)) {
    // Binance niêm yết theo USDT
    const q = quote === 'USD' ? 'USDT' : quote;
    return `BINANCE:${base}${q}`;
  }
  // Vàng và forex → OANDA
  return `OANDA:${base}${quote}`;
}

function loadChart(symbol) {
  activeSymbol = symbol;
  document.getElementById('currentSymbol').textContent = symbol;
  document.getElementById('tv_chart').innerHTML = '';
  tvWidget = new TradingView.widget({
    autosize: true,
    symbol: tvSymbol(symbol),
    interval: '60',
    timezone: 'Asia/Ho_Chi_Minh',
    theme: 'light',
    style: '1',
    locale: 'vi_VN',
    toolbar_bg: '#f1f3f6',
    enable_publishing: false,
    allow_symbol_change: true,
    withdateranges: true,
    hide_side_toolbar: false,
    container_id: 'tv_chart',
  });
  // highlight active
  document.querySelectorAll('.symbol-item').forEach(el => {
    el.classList.toggle('active', el.dataset.symbol === symbol);
  });
}

function renderList() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  const list = document.getElementById('symbolsList');
  // Danh sách đã được API sắp theo sort_order trong DB → giữ nguyên thứ tự
  const filtered = symbols.filter(s =>
    !q || s.symbol.toUpperCase().includes(q) || String(s.name).toUpperCase().includes(q));

  document.getElementById('symbolCount').textContent = `${filtered.length}`;

  if (!filtered.length) {
    list.innerHTML = '<li class="empty">Không tìm thấy symbol nào.</li>';
    return;
  }

  list.innerHTML = filtered.map(s => {
    const crypto = isCrypto(s.symbol);
    const tagCls = crypto ? 'crypto' : 'fx';
    const tagLabel = crypto ? 'Crypto' : 'FX';
    const star = s.favorite ? '<span class="symbol-star">⭐</span>' : '';
    const active = s.symbol === activeSymbol ? ' active' : '';
    return `
    <li class="symbol-item${active}" data-symbol="${esc(s.symbol)}" onclick="loadChart('${esc(s.symbol)}')">
      <div class="symbol-meta">
        <div class="symbol-code">${star}${esc(s.symbol)}</div>
        <div class="symbol-name">${esc(s.name)}</div>
      </div>
      <span class="symbol-tag ${tagCls}">${tagLabel}</span>
    </li>`;
  }).join('');
}

function getApiKey() { return localStorage.getItem('apiKey') || ''; }

// fetch có kèm x-api-key; tự prompt key rồi thử lại 1 lần khi gặp 401
async function apiFetch(url, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  const key = getApiKey();
  if (key) headers['x-api-key'] = key;
  let res = await fetch(url, { ...opts, headers });
  if (res.status === 401) {
    const k = prompt('Nhập API key (API_SERVER_KEY):', key);
    if (k != null) localStorage.setItem('apiKey', k.trim());
    res = await fetch(url, { ...opts, headers: { ...headers, 'x-api-key': getApiKey() } });
  }
  return res;
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 4500);
}

// Phân tích symbol đang chọn trên chart
async function runAnalyze() {
  const btn = document.getElementById('analyzeBtn');
  if (btn.disabled) return;
  if (!activeSymbol) { showToast('Chưa chọn symbol nào', 'error'); return; }

  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Đang phân tích...';
  showToast(`Đang phân tích ${activeSymbol}, vui lòng đợi...`);

  try {
    const res = await apiFetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: activeSymbol }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Phân tích thất bại');
    const secs = data.duration_ms != null ? ` (${(data.duration_ms / 1000).toFixed(1)}s)` : '';
    showToast(`✓ Phân tích ${activeSymbol} hoàn tất${secs} — xem ở trang Tín hiệu`, 'success');
  } catch (e) {
    showToast('✗ ' + (e.message || 'Phân tích thất bại'), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

// ── Thêm coin từ TradingView ──
function toggleAddPanel() {
  const panel = document.getElementById('addPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('tvSearchInput').focus();
  } else {
    document.getElementById('addResults').innerHTML = '';
    document.getElementById('tvSearchInput').value = '';
  }
}

let tvSearchTimer;
function onTvSearchInput() {
  clearTimeout(tvSearchTimer);
  const q = document.getElementById('tvSearchInput').value.trim();
  const box = document.getElementById('addResults');
  if (q.length < 2) { box.innerHTML = '<li class="add-hint">Gõ ít nhất 2 ký tự…</li>'; return; }
  box.innerHTML = '<li class="add-hint">Đang tìm…</li>';
  tvSearchTimer = setTimeout(() => searchTradingView(q), 300);
}

async function searchTradingView(q) {
  const box = document.getElementById('addResults');
  try {
    const res = await apiFetch('/api/tv/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Tìm kiếm thất bại');
    if (!data.length) { box.innerHTML = '<li class="add-hint">Không có kết quả.</li>'; return; }

    const existing = new Set(symbols.map(s => s.symbol.toUpperCase()));
    box.innerHTML = data.map(r => {
      const added = existing.has(r.symbol.toUpperCase());
      return `<li class="add-result-item">
        <div class="ar-meta">
          <div class="ar-code">${esc(r.symbol)}</div>
          <div class="ar-name">${esc(r.name)} · ${esc(r.tvSymbol)}</div>
        </div>
        <button class="ar-add" ${added ? 'disabled' : ''}
          onclick='addSymbol(${JSON.stringify(r).replace(/'/g, "&#39;")}, this)'>
          ${added ? 'Đã có' : '+ Thêm'}
        </button>
      </li>`;
    }).join('');
  } catch (e) {
    box.innerHTML = `<li class="add-hint">✗ ${esc(e.message)}</li>`;
  }
}

async function addSymbol(item, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await apiFetch('/api/symbols', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: item.symbol, name: item.name }),
    });
    const data = await res.json();
    if (!res.ok && res.status !== 409) throw new Error(data.error || 'Thêm thất bại');
    btn.textContent = 'Đã có';
    activeSymbol = item.symbol; // mở luôn chart vừa thêm
    await loadSymbols();        // refresh danh sách bên dưới
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '+ Thêm';
    alert('Lỗi: ' + e.message);
  }
}

async function loadSymbols() {
  try {
    const res = await apiFetch('/api/symbols');
    const data = await res.json();
    symbols = Array.isArray(data) ? data : [];

    // Fallback nếu DB chưa có symbol nào
    if (!symbols.length) {
      symbols = [
        { symbol: 'XAU/USD', name: 'Vàng / USD', favorite: true },
        { symbol: 'XAG/USD', name: 'Bạc / USD', favorite: true },
        { symbol: 'BTC/USD', name: 'Bitcoin / USD', favorite: true },
        { symbol: 'ETH/USD', name: 'Ethereum / USD', favorite: false },
      ];
    }

    renderList();
    loadChart(activeSymbol || symbols[0].symbol);
  } catch (e) {
    document.getElementById('symbolsList').innerHTML =
      '<li class="empty">Không thể tải danh sách symbol.</li>';
    // vẫn hiển thị chart mặc định
    loadChart('XAU/USD');
  }
}

loadSymbols();
</script>
</body>
</html>
